services:
  postgres:
    image: postgres:16
    container_name: hotelboss-postgres
    environment:
      POSTGRES_DB: hotelboss
      POSTGRES_USER: hotelboss
      POSTGRES_PASSWORD: hotelboss
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hotelboss"]
      interval: 10s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: hotelboss-keycloak
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hotelboss
      KC_DB_USERNAME: hotelboss
      KC_DB_PASSWORD: hotelboss
    volumes:
      - ./infra/keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json
    ports:
      - "8180:8080"
    depends_on:
      postgres:
        condition: service_healthy

  backend:
    build: ./backend
    container_name: hotelboss-backend
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/hotelboss
      DB_USER: hotelboss
      DB_PASSWORD: hotelboss
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/hotelboss
      AZURE_QUEUE_CONNECTION_STRING: ${AZURE_QUEUE_CONNECTION_STRING:-DefaultEndpointsProtocol=http;AccountName=devstoreaccount1;AccountKey=Eby8vdM02xNOcqFlqUwJPLlmEtlCDXJ1OGLjX+Y96tu9bOa/S7oFtfOrEWpo+4Kg==;QueueEndpoint=http://azurite:10001/devstoreaccount1;}
      AZURE_QUEUE_NAME: booking-confirmations
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: hotelboss-frontend
    environment:
      NEXT_PUBLIC_KEYCLOAK_URL: http://localhost:8180
      NEXT_PUBLIC_KEYCLOAK_REALM: hotelboss
      NEXT_PUBLIC_KEYCLOAK_CLIENT_ID: hotel-frontend
      NEXT_PUBLIC_API_URL: http://localhost:8080/api
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data: